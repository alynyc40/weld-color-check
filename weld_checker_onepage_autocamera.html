<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weld Checker</title>
<style>
body{font-family:Arial;background:#f4f6f8;margin:0;padding:10px}
.wrap{max-width:480px;margin:auto}
.viewer{position:relative;width:100%;aspect-ratio:3/4;background:#ccc;border-radius:12px;overflow:hidden}
video,canvas,img{position:absolute;width:100%;height:100%;object-fit:cover}
.guide{position:absolute;left:12%;top:42%;width:76%;height:16%;border:3px solid #00d26a;border-radius:10px}
.btn{width:100%;padding:12px;margin-top:6px;border:none;border-radius:10px;font-weight:bold}
.green{background:#16a34a;color:#fff}
.grey{background:#e5e7eb}
.result{margin-top:8px;padding:10px;border-radius:10px;background:#ddd}
</style>
</head>
<body>
<div class="wrap">
<div class="viewer">
<video id="camera" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div class="guide"></div>
</div>

<button class="btn green" onclick="takePhoto()">Take Photo</button>
<button class="btn grey" onclick="analyze()">Analyze</button>

<div id="result" class="result">Ready</div>
</div>

<script>
let stream;
async function start(){
stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
camera.srcObject=stream;
}
start();

function takePhoto(){
let c=document.getElementById("canvas");
c.width=camera.videoWidth;
c.height=camera.videoHeight;
c.getContext("2d").drawImage(camera,0,0);
}

function analyze(){
document.getElementById("result").innerHTML="ACCEPTABLE";
}
</script>
</body>
</html>
